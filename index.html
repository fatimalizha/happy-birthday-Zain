<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Zain | 21</title>
    <style>
        :root {
            --black: #0a0a0a;
            --white: #ffffff;
            --red: #9e1b1b;
            --navy: #0d1b2a;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* LANDING PAGE - MINIMALIST */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('LINK_FOTO_KOLASE_KAMU');
            background-size: cover;
            background-position: center;
        }

        .hero h1 {
            font-size: 1.5rem;
            letter-spacing: 0.8rem;
            font-weight: 200;
            text-transform: uppercase;
        }

        /* PASSCODE GATE */
        .gate {
            background-color: var(--navy);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .pass-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--white);
            color: white;
            font-size: 3rem;
            text-align: center;
            width: 200px;
            outline: none;
            font-weight: 100;
        }

        /* COLLAGE SECTION */
        .collage-container {
            padding: 100px 20px;
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .photo-item {
            background: #111;
            height: 400px;
            border: 1px solid #222;
            overflow: hidden;
            position: relative;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: 0.5s;
        }

        .photo-item:hover img {
            filter: grayscale(0%);
        }

        /* THE MISSING PIECE */
        .puzzle-section {
            background-color: var(--white);
            color: var(--black);
            padding: 100px 0;
            text-align: center;
        }

        .missing-box {
            width: 300px;
            height: 300px;
            border: 2px dashed #ccc;
            margin: 40px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f9f9;
            font-style: italic;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="hero" id="hero">
        <h1>A Gift for Zain</h1>
        <button onclick="document.getElementById('gate').scrollIntoView()">Explore</button>
    </div>
    </body>
</html>
